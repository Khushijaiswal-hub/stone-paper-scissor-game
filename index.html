<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Stone Paper Scissor</title>
    <link rel="stylesheet" href="sheet.css">
    
</head>
<body>
     <h1>Stone Paper Scissor</h1>
     <main>
    
    <div class="choices">
    <div class="option" id="paper">
        <img src="paper.png"/>
        </div>
        <div class="option" id="stone">
        <img src="stone.png"/>
        </div>        
        <div class="option" id="scissor">
        <img src="scissor.png"/>
    </div>
    </div>
    <div class="score-board">
        <div class="score">
            <p id ="user">0</p>
            <p>You</p>
        </div>
        <div class ="score">
            <p id ="computer">0</p>
        <p>computer</p>
        </div>

    </div>
    <div class="msg-cont">
        <p id="msg">Make your move</p>
    </div>
 </main>
 <script src="app.js"></script>
    
</body>
</html>
